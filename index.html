<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor de Desinformación</title>
  <style>
    /* TABLA */
    #tabla-datos {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 14px;
    }

    #tabla-datos th {
      text-align: left;
      padding: 10px 14px;
      background-color: #534AB7;
      color: white;
    }

    #tabla-datos td {
      padding: 10px 14px;
      border-bottom: 1px solid #ddd;
    }

    #tabla-datos tr:nth-child(even) {
      background-color: #f5f5f5;
    }

    #tabla-datos tr:hover {
      background-color: #e8e6ff;
    }

    #tabla-datos a {
      color: #534AB7;
      text-decoration: none;
    }

    #tabla-datos a:hover {
      text-decoration: underline;
    }
    /* VISTA DE INICIO */
    #vista-inicio {
      margin-top: 20px;
    }

    #vista-inicio h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    #vista-inicio p {
      color: #888;
      font-size: 16px;
      margin-bottom: 40px;
    }
  
    /* BOTONES DE PLATAFORMA */
    .contenedor-botones {
      display: flex;
      gap: 20px;
      margin-top: 30px;
      max-width: 500px;
    }

    .btn-plataforma {
      flex: 1;
      text-align: center;
      background-color: #534AB7;
      color: white;
      padding: 25px 10px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
    }

    .btn-plataforma:hover {
      background-color: #3C3489;
      transform: translateY(-2px);
    }

    .btn-plataforma.activo {
      background-color: #26215C;
      border: 2px solid #CECBF6;
      transform: scale(1.05);
    }

    /* MODAL - fondo oscuro */
    #modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    /* MODAL - caja de contenido */
    #modal-contenido {
      background: #1a1a2e;
      color: #e0e0e0;
      width: 80%;
      max-height: 85vh;
      overflow-y: auto;
      border-radius: 12px;
      padding: 2rem;
    }

    /* MODAL - título */
    #modal-titulo {
      color: #CECBF6;
      font-size: 24px;
      margin-top: 1rem;
      margin-bottom: 0.5rem;
    }

    /* MODAL - nombre de plataforma */
    #modal-plataforma {
      color: #888;
      font-size: 13px;
      margin-bottom: 1.5rem;
    }

    /* BOTÓN CERRAR dentro del modal */
    #btn-cerrar-modal {
      background: none;
      border: 1px solid #534AB7;
      color: #CECBF6;
      padding: 6px 16px;
      border-radius: 8px;
      cursor: pointer;
      float: right;
    }

    #btn-cerrar-modal:hover {
      background: #534AB7;
    }

  </style>
</head>
<body>

  <!-- ENCABEZADO -->
  <div id="encabezado">
    <h1>Monitor de Desinformación</h1>
    <p>Análisis de comportamiento inauténtico en redes sociales</p>
  </div>

  <!-- BOTONES -->
  <div class="contenedor-botones">
    <button class="btn-plataforma" onclick="cambiarPlataforma('bluesky')">Bluesky</button>
    <button class="btn-plataforma" onclick="cambiarPlataforma('reddit')">Reddit</button>
  </div>

  <!-- VISTA GENERAL (inicio) -->
  <div id="vista-inicio">
    <h2>Top 5 estafas detectadas — todas las plataformas</h2>
    <canvas id="mi-grafico"></canvas>

    <h2>Datos recolectados</h2>
    <table id="tabla-datos">
      <thead>
        <tr>
          <th>Fecha extracción</th>
          <th>Tipo de estafa</th>
          <th>Fuente</th>
          <th>URL</th>
        </tr>
      </thead>
      <tbody id="cuerpo-tabla">
        <!-- filas generadas por JavaScript -->
      </tbody>
    </table>
  </div>

  <!-- VISTA POR PLATAFORMA -->
  <div id="vista-plataforma" style="display: none;">
    <button onclick="volverInicio()">← Volver</button>
    <p id="nombre-plataforma"></p>
    <canvas id="grafico-plataforma"></canvas>
  </div>

  <!-- MODAL -->
  <div id="modal-overlay" style="display: none;">
    <div id="modal-contenido">
      <button id="btn-cerrar-modal" onclick="cerrarModal()">✕ Cerrar</button>
      <h2 id="modal-titulo">Título</h2>
      <p id="modal-plataforma">Plataforma</p>
      <p id="modal-resumen">Resumen aquí...</p>
      <canvas id="modal-grafico"></canvas>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
