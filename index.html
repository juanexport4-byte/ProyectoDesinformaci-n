<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor de Desinformación</title>
  <style>
  /* MODAL - fondo oscuro que cubre toda la pantalla */
  #modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
  }

  /* MODAL - caja de contenido centrada */
  #modal-contenido {
    background: #1a1a2e;
    color: #e0e0e0;
    width: 80%;
    max-height: 85vh;
    overflow-y: auto;
    border-radius: 12px;
    padding: 2rem;
  }

  /* MODAL - título */
  #modal-titulo {
    color: #CECBF6;
    font-size: 24px;
    margin-top: 1rem;
    margin-bottom: 0.5rem;
  }

  /* MODAL - nombre de plataforma */
  #modal-plataforma {
    color: #888;
    font-size: 13px;
    margin-bottom: 1.5rem;
  }

  /* BOTÓN CERRAR */
  #modal-contenido button {
    background: none;
    border: 1px solid #534AB7;
    color: #CECBF6;
    padding: 6px 16px;
    border-radius: 8px;
    cursor: pointer;
    float: right;
  }

  #modal-contenido button:hover {
    background: #534AB7;
  }
</style>
</head>
<body>

  <!-- ENCABEZADO -->
  <div id="encabezado">
    <h1>Monitor de Desinformación</h1>
    <p>Estafas más frecuentes detectadas</p>
  </div>

  <!-- BOTONES DE PLATAFORMA -->
  <div id="botones-plataforma">
    <button id="btn-bluesky" onclick="cambiarPlataforma('bluesky')">Bluesky</button>
    <button id="btn-reddit" onclick="cambiarPlataforma('reddit')">Reddit</button>
  </div>

  <!-- ÁREA DEL GRÁFICO -->
  <div id="area-grafico">
    <p id="nombre-plataforma">Bluesky</p>
    <canvas id="mi-grafico"></canvas>
  </div>

  <!-- PANEL DE DETALLE (oculto al inicio) -->
  <div id="panel-detalle" style="display: none;">
    <h2 id="detalle-titulo">Título estafa</h2>
    <p id="detalle-resumen">Aquí irá el análisis...</p>
  </div>
  <!-- LIBRERÍA CHART.JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <!-- NUESTRO SCRIPT -->
  <script src="script.js"></script>
  <!-- MODAL DE DETALLE -->
  <div id="modal-overlay" style="display: none;">
    <div id="modal-contenido">

      <button onclick="cerrarModal()">✕ Cerrar</button>
      <h2 id="modal-titulo">Título</h2>
      <p id="modal-plataforma">Plataforma</p>

      <p id="modal-resumen">Resumen aquí...</p>

      <canvas id="modal-grafico"></canvas>

    </div>
  </div>
</body>
</html>
