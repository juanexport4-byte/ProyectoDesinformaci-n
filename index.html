<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor de Desinformación</title>
  <style>

    /* BOTONES DE PLATAFORMA */
    .contenedor-botones {
      display: flex;
      gap: 20px;
      margin-top: 30px;
      max-width: 500px;
    }

    .btn-plataforma {
      flex: 1;
      text-align: center;
      background-color: #534AB7;
      color: white;
      padding: 25px 10px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
    }

    .btn-plataforma:hover {
      background-color: #3C3489;
      transform: translateY(-2px);
    }

    .btn-plataforma.activo {
      background-color: #26215C;
      border: 2px solid #CECBF6;
      transform: scale(1.05);
    }

    /* MODAL - fondo oscuro */
    #modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    /* MODAL - caja de contenido */
    #modal-contenido {
      background: #1a1a2e;
      color: #e0e0e0;
      width: 80%;
      max-height: 85vh;
      overflow-y: auto;
      border-radius: 12px;
      padding: 2rem;
    }

    /* MODAL - título */
    #modal-titulo {
      color: #CECBF6;
      font-size: 24px;
      margin-top: 1rem;
      margin-bottom: 0.5rem;
    }

    /* MODAL - nombre de plataforma */
    #modal-plataforma {
      color: #888;
      font-size: 13px;
      margin-bottom: 1.5rem;
    }

    /* BOTÓN CERRAR dentro del modal */
    #btn-cerrar-modal {
      background: none;
      border: 1px solid #534AB7;
      color: #CECBF6;
      padding: 6px 16px;
      border-radius: 8px;
      cursor: pointer;
      float: right;
    }

    #btn-cerrar-modal:hover {
      background: #534AB7;
    }

  </style>
</head>
<body>

  <!-- ENCABEZADO -->
  <div id="encabezado">
    <h1>Monitor de Desinformación</h1>
    <p>Estafas más frecuentes detectadas</p>
  </div>
  <!-- BOTONES DE PLATAFORMA -->
  <div id="botones-plataforma" class="contenedor-botones">
    <button id="btn-bluesky" class="btn-plataforma activo" onclick="cambiarPlataforma('bluesky')">Bluesky</button>
    <button id="btn-reddit" class="btn-plataforma" onclick="cambiarPlataforma('reddit')">Reddit</button>
  </div>

  <!-- ÁREA DEL GRÁFICO -->
  <div id="area-grafico">
    <p id="nombre-plataforma">Bluesky</p>
    <canvas id="mi-grafico"></canvas>
  </div>

  <!-- PANEL DE DETALLE (oculto al inicio) -->
  <div id="panel-detalle" style="display: none;">
    <h2 id="detalle-titulo">Título estafa</h2>
    <p id="detalle-resumen">Aquí irá el análisis...</p>
  </div>

  <!-- MODAL DE DETALLE -->
  <div id="modal-overlay" style="display: none;">
    <div id="modal-contenido">
      <button id="btn-cerrar-modal" onclick="cerrarModal()">✕ Cerrar</button>
      <h2 id="modal-titulo">Título</h2>
      <p id="modal-plataforma">Plataforma</p>
      <p id="modal-resumen">Resumen aquí...</p>
      <canvas id="modal-grafico"></canvas>
    </div>
  </div>

  <!-- LIBRERÍA CHART.JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <!-- NUESTRO SCRIPT -->
  <script src="script.js"></script>

</body>
</html>
